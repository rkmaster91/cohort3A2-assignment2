<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScaleX</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <h6 class="ScaleX">ScaleX</h6>
      <div class="mid">
        <div class="sections">Home</div>
        <div class="sections">Blogs</div>
        <div class="sections">About us</div>
        <div class="sections">Contact Us</div>
      </div>
      <button class="end-button">Get Started</button>
    </nav>
    <h1>Insights & Blogs</h1>
    <div class="catroot">
      <div class="categories">
        <button class="cat active">All</button><button class="cat">Tech</button
        ><button class="cat">SaaS</button><button class="cat">Marketing</button>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <div class="image">
          <img src="./WINE.webp" alt="" />
        </div>
        <div class="cardcontent">
          <button class="Concat">Tech</button>
          <h2>The ultimate guide to SaaS Marketing</h2>
          <p>3rd of May 2025</p>
        </div>
      </div>
      <div class="card">
        <div class="image">
          <img src="./CAHIRS.webp" alt="" />
        </div>
        <div class="cardcontent">
          <button class="Concat">SaaS</button>
          <h2>five key trends in SaaS growth for 2026</h2>
          <p>23rd of may 2025</p>
        </div>
      </div>
      <div class="card">
        <div class="image">
          <img src="./CAT.webp" alt="" />
        </div>
        <div class="cardcontent">
          <button class="Concat">Marketing</button>
          <h2>how data-driven strategies are important</h2>
          <p>23rd of may 2025</p>
        </div>
      </div>
    </div>
  </body>
</html>
